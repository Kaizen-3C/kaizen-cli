name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip build

      - run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-binaries:
    name: Build binary (${{ matrix.artifact }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: kaizen-windows-x64.exe
          - os: macos-13
            artifact: kaizen-macos-x64
          - os: macos-14
            artifact: kaizen-macos-arm64
          - os: ubuntu-22.04
            artifact: kaizen-linux-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller ".[demo]"

      - name: Build binary
        run: python scripts/release/build-binaries.py

      - name: Smoke test
        shell: bash
        run: |
          ./dist/${{ matrix.artifact }} --version
          ./dist/${{ matrix.artifact }} status --help

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
