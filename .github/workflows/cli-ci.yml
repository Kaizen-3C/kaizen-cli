name: CLI cross-OS smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install kaizen-3c-cli (editable, demo + dev extras)
        run: pip install -e .[demo,dev]

      - name: Tier 0.2 — kaizen --version
        run: kaizen --version

      - name: Tier 0.3 — kaizen --help
        run: kaizen --help

      - name: Tier 0.4 — kaizen demo (python-slugify e2e)
        # The bundled demo's recomposed code has ONE documented behavioral
        # divergence (test_lowercase_false) — pytest exits 1 because of it.
        # That's the *expected* fingerprint, not a regression. Treat exit 1
        # + the canonical "1 failed, 33 passed" + test_lowercase_false trio
        # as success; anything else is a real failure.
        timeout-minutes: 5
        run: |
          set +e
          kaizen demo > demo.out 2>&1
          rc=$?
          cat demo.out
          echo "---"
          echo "kaizen demo exit code: $rc"
          if [ $rc -eq 1 ] \
            && grep -q "1 failed, 33 passed" demo.out \
            && grep -q "test_lowercase_false" demo.out; then
            echo "OK: matches expected fingerprint (33 passed + 1 documented divergence)"
            exit 0
          fi
          echo "FAIL: expected rc=1 with '1 failed, 33 passed' and 'test_lowercase_false'"
          exit 1

      # cli/tests/ exists in this repo — run pytest
      - name: pytest cli/tests/
        run: pytest cli/tests/
